<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Geospatial Intelligence Platform</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Courier New', monospace; background: #0a0e1a; color: #00ff88; }

  #app { display: flex; height: 100vh; }

  /* Sidebar */
  #sidebar {
    width: 320px; min-width: 320px;
    background: #0d1117;
    border-right: 1px solid #1a2332;
    display: flex; flex-direction: column;
    overflow: hidden;
  }

  #header {
    padding: 16px;
    border-bottom: 1px solid #1a2332;
    background: #0a0e1a;
  }

  #header h1 {
    font-size: 14px;
    color: #00ff88;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  #header p {
    font-size: 10px;
    color: #4a5568;
    margin-top: 4px;
    letter-spacing: 1px;
  }

  /* Stats */
  #stats {
    padding: 12px 16px;
    border-bottom: 1px solid #1a2332;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }

  .stat-box {
    background: #1a2332;
    border-radius: 4px;
    padding: 8px;
    text-align: center;
  }

  .stat-box .value {
    font-size: 20px;
    font-weight: bold;
  }

  .stat-box .label {
    font-size: 9px;
    color: #4a5568;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .stat-active { color: #00ff88; }
  .stat-warning { color: #ffaa00; }
  .stat-threat { color: #ff4444; }
  .stat-ship { color: #4488ff; }
  .stat-aircraft { color: #ff88ff; }
  .stat-vehicle { color: #ffff44; }

  /* Filters */
  #filters {
    padding: 12px 16px;
    border-bottom: 1px solid #1a2332;
  }

  #filters h3 {
    font-size: 10px;
    color: #4a5568;
    letter-spacing: 2px;
    margin-bottom: 8px;
    text-transform: uppercase;
  }

  .filter-row {
    display: flex;
    gap: 6px;
    margin-bottom: 6px;
    flex-wrap: wrap;
  }

  .filter-btn {
    padding: 4px 10px;
    border: 1px solid;
    background: transparent;
    font-family: 'Courier New', monospace;
    font-size: 10px;
    cursor: pointer;
    border-radius: 3px;
    letter-spacing: 1px;
    transition: all 0.2s;
  }

  .filter-btn.active-filter { opacity: 1; }
  .filter-btn.inactive-filter { opacity: 0.3; }

  .btn-ship { color: #4488ff; border-color: #4488ff; }
  .btn-ship.active-filter { background: #4488ff22; }
  .btn-aircraft { color: #ff88ff; border-color: #ff88ff; }
  .btn-aircraft.active-filter { background: #ff88ff22; }
  .btn-vehicle { color: #ffff44; border-color: #ffff44; }
  .btn-vehicle.active-filter { background: #ffff4422; }
  .btn-active { color: #00ff88; border-color: #00ff88; }
  .btn-active.active-filter { background: #00ff8822; }
  .btn-warning { color: #ffaa00; border-color: #ffaa00; }
  .btn-warning.active-filter { background: #ffaa0022; }
  .btn-threat { color: #ff4444; border-color: #ff4444; }
  .btn-threat.active-filter { background: #ff444422; }

  /* Object list */
  #object-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }

  #object-list::-webkit-scrollbar { width: 4px; }
  #object-list::-webkit-scrollbar-track { background: #0d1117; }
  #object-list::-webkit-scrollbar-thumb { background: #1a2332; }

  .object-item {
    padding: 8px 10px;
    border: 1px solid #1a2332;
    border-radius: 4px;
    margin-bottom: 4px;
    cursor: pointer;
    transition: all 0.2s;
    background: #111827;
  }

  .object-item:hover { border-color: #00ff88; background: #0d1f16; }
  .object-item.selected { border-color: #00ff88; background: #0d1f16; }

  .object-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 4px;
  }

  .object-name {
    font-size: 11px;
    font-weight: bold;
    color: #e2e8f0;
  }

  .status-badge {
    font-size: 9px;
    padding: 2px 6px;
    border-radius: 2px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .status-active { background: #00ff8822; color: #00ff88; border: 1px solid #00ff88; }
  .status-warning { background: #ffaa0022; color: #ffaa00; border: 1px solid #ffaa00; }
  .status-threat { background: #ff444422; color: #ff4444; border: 1px solid #ff4444; }

  .object-meta {
    font-size: 9px;
    color: #4a5568;
    display: flex;
    gap: 8px;
  }

  /* Detail panel */
  #detail-panel {
    padding: 12px 16px;
    border-top: 1px solid #1a2332;
    background: #0a0e1a;
    display: none;
  }

  #detail-panel.visible { display: block; }

  #detail-panel h3 {
    font-size: 11px;
    color: #00ff88;
    margin-bottom: 8px;
    letter-spacing: 1px;
  }

  .detail-row {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    margin-bottom: 4px;
    padding: 3px 0;
    border-bottom: 1px solid #1a2332;
  }

  .detail-row .key { color: #4a5568; }
  .detail-row .val { color: #e2e8f0; }

  /* Map */
  #map {
    flex: 1;
    background: #1a2332;
  }

  /* Connection status */
  #conn-status {
    position: fixed;
    top: 12px;
    right: 12px;
    padding: 6px 12px;
    border-radius: 4px;
    font-size: 10px;
    letter-spacing: 1px;
    z-index: 9999;
    border: 1px solid;
  }

  .conn-ok { background: #00ff8822; color: #00ff88; border-color: #00ff88; }
  .conn-err { background: #ff444422; color: #ff4444; border-color: #ff4444; }

  /* Threat alert */
  #alert-bar {
    position: fixed;
    top: 0; left: 320px; right: 0;
    padding: 8px 16px;
    background: #ff4444;
    color: white;
    font-size: 12px;
    letter-spacing: 1px;
    text-align: center;
    z-index: 9998;
    display: none;
    animation: blink 1s infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  /* Timestamp */
  #timestamp {
    padding: 8px 16px;
    border-top: 1px solid #1a2332;
    font-size: 9px;
    color: #4a5568;
    letter-spacing: 1px;
  }
</style>
</head>
<body>
<div id="conn-status" class="conn-err">⬤ DISCONNECTED</div>
<div id="alert-bar">⚠ THREAT DETECTED</div>

<div id="app">
  <!-- Sidebar -->
  <div id="sidebar">
    <div id="header">
      <h1>⬡ GEO-INTEL PLATFORM</h1>
      <p>REAL-TIME SITUATIONAL AWARENESS</p>
    </div>

    <div id="stats">
      <div class="stat-box">
        <div class="value stat-ship" id="stat-ships">0</div>
        <div class="label">Ships</div>
      </div>
      <div class="stat-box">
        <div class="value stat-aircraft" id="stat-aircraft">0</div>
        <div class="label">Aircraft</div>
      </div>
      <div class="stat-box">
        <div class="value stat-vehicle" id="stat-vehicles">0</div>
        <div class="label">Vehicles</div>
      </div>
      <div class="stat-box">
        <div class="value stat-active" id="stat-active">0</div>
        <div class="label">Active</div>
      </div>
      <div class="stat-box">
        <div class="value stat-warning" id="stat-warning">0</div>
        <div class="label">Warning</div>
      </div>
      <div class="stat-box">
        <div class="value stat-threat" id="stat-threats">0</div>
        <div class="label">Threats</div>
      </div>
    </div>

    <div id="filters">
      <h3>Filter</h3>
      <div class="filter-row">
        <button class="filter-btn btn-ship active-filter" onclick="toggleFilter('ship')">SHIP</button>
        <button class="filter-btn btn-aircraft active-filter" onclick="toggleFilter('aircraft')">AIRCRAFT</button>
        <button class="filter-btn btn-vehicle active-filter" onclick="toggleFilter('vehicle')">VEHICLE</button>
      </div>
      <div class="filter-row">
        <button class="filter-btn btn-active active-filter" onclick="toggleFilter('active')">ACTIVE</button>
        <button class="filter-btn btn-warning active-filter" onclick="toggleFilter('warning')">WARNING</button>
        <button class="filter-btn btn-threat active-filter" onclick="toggleFilter('threat')">THREAT</button>
      </div>
    </div>

    <div id="object-list"></div>

    <div id="detail-panel">
      <h3 id="detail-name">OBJECT DETAILS</h3>
      <div id="detail-content"></div>
    </div>

    <div id="timestamp">LAST UPDATE: --:--:--</div>
  </div>

  <!-- Map -->
  <div id="map"></div>
</div>

<script>
// ---------------------------------------------------------------------------
// State
// ---------------------------------------------------------------------------
let objects = {};
let markers = {};
let trails = {};
let selectedId = null;
let filters = {
  ship: true, aircraft: true, vehicle: true,
  active: true, warning: true, threat: true,
};

// ---------------------------------------------------------------------------
// Map setup (dark theme using CartoDB dark tiles)
// ---------------------------------------------------------------------------
const map = L.map('map', {
  center: [20, 0],
  zoom: 3,
  zoomControl: true,
});

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap © CARTO',
  subdomains: 'abcd',
  maxZoom: 19,
}).addTo(map);

// ---------------------------------------------------------------------------
// Icons
// ---------------------------------------------------------------------------
function getIcon(type, status) {
  const colors = { active: '#00ff88', warning: '#ffaa00', threat: '#ff4444' };
  const shapes = { ship: '⛵', aircraft: '✈', vehicle: '🚗' };
  const color = colors[status] || '#00ff88';
  const emoji = shapes[type] || '●';

  return L.divIcon({
    html: `<div style="
      width:28px;height:28px;
      background:${color}22;
      border:2px solid ${color};
      border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      font-size:14px;
      box-shadow:0 0 8px ${color}88;
    ">${emoji}</div>`,
    iconSize: [28, 28],
    iconAnchor: [14, 14],
    className: '',
  });
}

// ---------------------------------------------------------------------------
// Update map markers
// ---------------------------------------------------------------------------
function updateMarkers(newObjects) {
  const visible = new Set();

  newObjects.forEach(obj => {
    objects[obj.id] = obj;

    // Check filters
    if (!filters[obj.type] || !filters[obj.status]) return;
    visible.add(obj.id);

    if (markers[obj.id]) {
      // Update existing marker
      markers[obj.id].setLatLng([obj.lat, obj.lon]);
      markers[obj.id].setIcon(getIcon(obj.type, obj.status));
    } else {
      // Create new marker
      const marker = L.marker([obj.lat, obj.lon], {
        icon: getIcon(obj.type, obj.status),
      }).addTo(map);

      marker.on('click', () => selectObject(obj.id));
      markers[obj.id] = marker;
    }

    // Update trail
    if (obj.trail && obj.trail.length > 1) {
      if (trails[obj.id]) map.removeLayer(trails[obj.id]);
      const trailColor = { active: '#00ff8866', warning: '#ffaa0066', threat: '#ff444466' }[obj.status];
      trails[obj.id] = L.polyline(
        obj.trail.map(p => [p.lat, p.lon]),
        { color: trailColor, weight: 1.5, opacity: 0.6 }
      ).addTo(map);
    }
  });

  // Remove markers for hidden objects
  Object.keys(markers).forEach(id => {
    if (!visible.has(id) && markers[id]) {
      map.removeLayer(markers[id]);
      delete markers[id];
      if (trails[id]) { map.removeLayer(trails[id]); delete trails[id]; }
    }
  });
}

// ---------------------------------------------------------------------------
// Update sidebar list
// ---------------------------------------------------------------------------
function updateList(newObjects) {
  const list = document.getElementById('object-list');
  const filtered = newObjects.filter(o => filters[o.type] && filters[o.status]);
  filtered.sort((a, b) => {
    const order = { threat: 0, warning: 1, active: 2 };
    return (order[a.status] || 2) - (order[b.status] || 2);
  });

  list.innerHTML = filtered.map(obj => `
    <div class="object-item ${obj.id === selectedId ? 'selected' : ''}"
         onclick="selectObject('${obj.id}')">
      <div class="object-header">
        <span class="object-name">${obj.name}</span>
        <span class="status-badge status-${obj.status}">${obj.status}</span>
      </div>
      <div class="object-meta">
        <span>${obj.type.toUpperCase()}</span>
        <span>${obj.country}</span>
        <span>${obj.lat.toFixed(2)}°, ${obj.lon.toFixed(2)}°</span>
      </div>
    </div>
  `).join('');
}

// ---------------------------------------------------------------------------
// Update stats
// ---------------------------------------------------------------------------
function updateStats(stats) {
  document.getElementById('stat-ships').textContent = stats.ships || 0;
  document.getElementById('stat-aircraft').textContent = stats.aircraft || 0;
  document.getElementById('stat-vehicles').textContent = stats.vehicles || 0;
  document.getElementById('stat-active').textContent = stats.active || 0;
  document.getElementById('stat-warning').textContent = stats.warning || 0;
  document.getElementById('stat-threats').textContent = stats.threat || 0;

  // Show alert bar if threats exist
  const alertBar = document.getElementById('alert-bar');
  alertBar.style.display = stats.threat > 0 ? 'block' : 'none';
  if (stats.threat > 0) {
    alertBar.textContent = `⚠ ${stats.threat} THREAT${stats.threat > 1 ? 'S' : ''} DETECTED`;
  }
}

// ---------------------------------------------------------------------------
// Select object
// ---------------------------------------------------------------------------
function selectObject(id) {
  selectedId = id;
  const obj = objects[id];
  if (!obj) return;

  // Pan map to object
  map.panTo([obj.lat, obj.lon]);

  // Show detail panel
  const panel = document.getElementById('detail-panel');
  panel.classList.add('visible');
  document.getElementById('detail-name').textContent = obj.name;
  document.getElementById('detail-content').innerHTML = `
    <div class="detail-row"><span class="key">TYPE</span><span class="val">${obj.type.toUpperCase()}</span></div>
    <div class="detail-row"><span class="key">STATUS</span><span class="val" style="color:${obj.status==='threat'?'#ff4444':obj.status==='warning'?'#ffaa00':'#00ff88'}">${obj.status.toUpperCase()}</span></div>
    <div class="detail-row"><span class="key">COUNTRY</span><span class="val">${obj.country}</span></div>
    <div class="detail-row"><span class="key">LAT</span><span class="val">${obj.lat.toFixed(4)}°</span></div>
    <div class="detail-row"><span class="key">LON</span><span class="val">${obj.lon.toFixed(4)}°</span></div>
    <div class="detail-row"><span class="key">HEADING</span><span class="val">${obj.heading.toFixed(1)}°</span></div>
    <div class="detail-row"><span class="key">SPEED</span><span class="val">${obj.speed.toFixed(1)} ${obj.type==='vehicle'?'mph':'kts'}</span></div>
    ${obj.altitude > 0 ? `<div class="detail-row"><span class="key">ALTITUDE</span><span class="val">${Math.round(obj.altitude).toLocaleString()} ft</span></div>` : ''}
    <div class="detail-row"><span class="key">TRAIL PTS</span><span class="val">${obj.trail.length}</span></div>
  `;
}

// ---------------------------------------------------------------------------
// Filters
// ---------------------------------------------------------------------------
function toggleFilter(type) {
  filters[type] = !filters[type];
  const btn = document.querySelector(`.btn-${type}`);
  if (btn) btn.className = btn.className.replace(/active-filter|inactive-filter/g, '').trim()
    + ` ${filters[type] ? 'active-filter' : 'inactive-filter'}`;

  // Re-render with current objects
  const allObjs = Object.values(objects);
  updateMarkers(allObjs);
  updateList(allObjs);
}

// ---------------------------------------------------------------------------
// WebSocket connection
// ---------------------------------------------------------------------------
let ws;
let reconnectTimer;

function connect() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws`);

  ws.onopen = () => {
    document.getElementById('conn-status').textContent = '⬤ CONNECTED';
    document.getElementById('conn-status').className = 'conn-ok';
    clearTimeout(reconnectTimer);
  };

  ws.onmessage = (event) => {
    const msg = JSON.parse(event.data);
    if (msg.type === 'init' || msg.type === 'update') {
      updateMarkers(msg.objects);
      updateList(msg.objects);
      updateStats(msg.stats);

      const now = new Date();
      document.getElementById('timestamp').textContent =
        `LAST UPDATE: ${now.toTimeString().slice(0,8)} UTC`;
    }
  };

  ws.onclose = () => {
    document.getElementById('conn-status').textContent = '⬤ RECONNECTING...';
    document.getElementById('conn-status').className = 'conn-err';
    reconnectTimer = setTimeout(connect, 3000);
  };

  ws.onerror = () => ws.close();
}

connect();
</script>
</body>
</html>
